theme: jekyll-theme-cayman
title: Jack 的 Horizon 每日信息雷达
description: AI、凝聚态物理与微电子中文日报
baseurl: "/Horizon" # the subpath of your site, e.g. /blog
url: "https://jackhe496.github.io" # the base hostname & protocol for your site, e.g. http://example.com

# Build settings
markdown: kramdown
future: true # Allow future posts to be published
plugins:
  - jekyll-feed
feed:
  path: feed.xml
exclude:
  - ".github"
  - "node_modules"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "default"

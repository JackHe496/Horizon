name: Daily Horizon Summary

on:
  schedule:
    # GitHub scheduled workflows use UTC. 23:00 UTC is 07:00 Asia/Shanghai.
    - cron: '0 23 * * *'
  workflow_dispatch:      # Allow manual trigger

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to publish the daily report
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.26"

      - name: Install dependencies
        run: uv sync

      - name: Set report dates
        run: |
          echo "REPORT_DATE=$(date +'%Y-%m-%d')" >> "$GITHUB_ENV"
          echo "PUBLISH_DATE=$(date +'%Y-%m-%d')" >> "$GITHUB_ENV"

      - name: Prepare AI config
        run: cp data/config.github.json data/config.json

      - name: Generate AI digest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: uv run horizon --hours 24

      - name: Store AI digest in its own folder
        run: |
          mkdir -p docs/_posts/ai
          source="docs/_posts/${REPORT_DATE}-summary-zh.md"
          target="docs/_posts/ai/${REPORT_DATE}-ai-zh.md"
          sed -i "s|^title:.*|title: \"AI 日报：${REPORT_DATE}\"|" "$source"
          sed -i "/^lang: /a topic: ai" "$source"
          mv "$source" "$target"

      - name: Prepare condensed matter and microelectronics config
        run: cp data/config.physics-electronics.json data/config.json

      - name: Generate condensed matter and microelectronics digest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: uv run horizon --hours 24

      - name: Store physics and electronics digest in its own folder
        run: |
          mkdir -p docs/_posts/physics-electronics
          source="docs/_posts/${REPORT_DATE}-summary-zh.md"
          target="docs/_posts/physics-electronics/${REPORT_DATE}-physics-electronics-zh.md"
          sed -i "s|^title:.*|title: \"凝聚态与微电子日报：${REPORT_DATE}\"|" "$source"
          sed -i "/^lang: /a topic: physics-electronics" "$source"
          mv "$source" "$target"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true  # Keep existing summaries on gh-pages branch
          commit_message: "📝 AI + Physics Daily Summary: ${{ env.PUBLISH_DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
